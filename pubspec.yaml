name: streamtv
description: HourTV - App IPTV personal para Android, TV y PC
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  video_player: ^2.9.3
  chewie: ^1.10.0
  http: ^1.4.0
  shared_preferences: ^2.5.3
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  path_provider: ^2.1.6
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.4
  webview_flutter: 4.14.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/data/