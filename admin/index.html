<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HourTV — Panel de administración</title>
<style>
  :root{
    --bg:#0b0b0b; --surface:#141414; --card:#1f1f1f; --elev:#2b2b2b;
    --accent:#e50914; --accent2:#ff3341; --text:#f5f5f5; --muted:#b3b3b3; --dim:#6f6f6f;
    --ok:#2dd4a8; --warn:#ffb23e; --line:rgba(255,255,255,.08);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
  header{position:sticky;top:0;z-index:10;background:#0d0d0d;border-bottom:1px solid var(--line);padding:12px 18px;display:flex;align-items:center;gap:14px}
  .logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:18px}
  .logo .dot{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center}
  .logo .dot::after{content:'▶';font-size:13px;color:#fff}
  header .spacer{flex:1}
  button{font-family:inherit;font-size:14px;border:none;border-radius:8px;padding:9px 16px;cursor:pointer;font-weight:600;transition:.15s}
  button:active{transform:scale(.97)}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:var(--accent2)}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
  .btn-ghost:hover{color:var(--text);border-color:var(--muted)}
  .btn-sm{padding:6px 11px;font-size:12px}
  .tabs{display:flex;gap:6px;padding:10px 18px 0;background:#0d0d0d;border-bottom:1px solid var(--line);overflow-x:auto}
  .tab{background:none;color:var(--muted);border-radius:8px 8px 0 0;padding:10px 16px;font-weight:600;white-space:nowrap;border-bottom:2px solid transparent}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  main{max-width:1100px;margin:0 auto;padding:20px}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
  .toolbar input[type=search]{flex:1;min-width:180px}
  input,textarea,select{width:100%;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:10px 12px;color:var(--text);font-family:inherit;font-size:14px;outline:none}
  input:focus,textarea:focus,select:focus{border-color:var(--accent)}
  label{display:block;color:var(--muted);font-size:12px;margin:0 0 5px;font-weight:600}
  textarea{resize:vertical;min-height:70px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
  .item{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;cursor:pointer;transition:.15s}
  .item:hover{border-color:var(--accent);transform:translateY(-2px)}
  .item .thumb{width:100%;aspect-ratio:2/3;object-fit:cover;background:var(--elev);display:block}
  .item .thumb.ch{aspect-ratio:16/9;object-fit:contain;padding:8px}
  .item .cap{padding:8px 10px}
  .item .cap b{display:block;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item .cap span{color:var(--dim);font-size:11px}
  .badge{display:inline-block;background:var(--accent);color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;letter-spacing:.4px;vertical-align:middle}
  .empty{text-align:center;color:var(--dim);padding:60px 20px}
  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:50;display:none;align-items:center;justify-content:center;overflow:hidden;padding:clamp(12px,3vh,30px) 16px}
  .overlay.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--line);border-radius:14px;width:100%;max-width:820px;max-height:calc(100dvh - clamp(24px,6vh,60px));display:flex;flex-direction:column;overflow:hidden}
  .modal-head{display:flex;align-items:center;padding:16px 18px;border-bottom:1px solid var(--line);background:var(--surface);border-radius:14px 14px 0 0;flex:0 0 auto}
  .modal-head h3{margin:0;font-size:17px;flex:1}
  .modal-body{padding:18px;overflow-y:auto;min-height:0;overscroll-behavior:contain}
  .row{margin-bottom:14px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .row4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .rowtype{display:grid;grid-template-columns:160px 1fr;gap:12px}
  .check{display:flex;align-items:center;gap:10px;color:var(--text);font-size:14px;font-weight:600;cursor:pointer;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:11px 12px}
  .check input{width:auto;margin:0;accent-color:var(--accent)}
  .section-label{color:var(--muted);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--line)}
  .modal-foot{display:flex;gap:10px;justify-content:space-between;padding:16px 18px;border-top:1px solid var(--line);background:var(--surface);border-radius:0 0 14px 14px;flex:0 0 auto}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:6px 12px;font-size:12px;cursor:pointer;user-select:none}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .servers .srv{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .servers .srv input{flex:1}
  .servers .srv input.nm{max-width:150px}
  .language-group{background:rgba(255,255,255,.025);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px}
  .language-head{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
  .language-head input{flex:1;font-weight:700}
  .season{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:12px}
  .season .sh{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .season .sh input{max-width:80px}
  .seasons .ep{background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:9px;padding:10px;margin-bottom:10px}
  .episode-head{display:grid;grid-template-columns:72px 1fr auto;gap:8px;align-items:center;margin-bottom:10px}
  .episode-head .nm{max-width:72px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--elev);border:1px solid var(--line);border-radius:10px;padding:12px 20px;z-index:100;opacity:0;transition:.3s;pointer-events:none}
  .toast.show{opacity:1}
  .toast.ok{border-color:var(--ok)}
  .toast.err{border-color:var(--accent)}
  .thumbprev{width:52px;height:78px;object-fit:cover;border-radius:6px;background:var(--elev);flex-shrink:0}
  .thumbprev.wide{width:120px;height:68px}
  .imgfield{display:flex;gap:8px;align-items:stretch}
  .imgfield input[type=text],.imgfield>input{flex:1;min-width:0}
  .upload-btn{display:flex;align-items:center;justify-content:center;white-space:nowrap;flex-shrink:0;cursor:pointer;background:transparent;color:var(--muted);border:1px solid var(--line);border-radius:8px;padding:0 14px;font-size:13px;font-weight:600}
  .upload-btn:hover{color:var(--text);border-color:var(--muted)}
  .hint{color:var(--dim);font-size:12px;line-height:1.5}
  a{color:var(--accent2)}
  .status{font-size:12px;color:var(--muted)}
  .status b{color:var(--ok)}
  .del{color:var(--accent);background:none;border:none}
  @media (max-width:700px){
    header{flex-wrap:wrap}
    header .spacer{display:none}
    header .logo{flex:1;min-width:150px}
    header .status{order:3;width:100%}
    .overlay{padding:0;align-items:stretch}
    .modal{max-width:none;max-height:100dvh;min-height:100dvh;border-radius:0;border-left:0;border-right:0}
    .modal-head{border-radius:0}
    .modal-foot{border-radius:0;padding-bottom:max(16px,env(safe-area-inset-bottom))}
    .row2,.row3,.row4,.rowtype{grid-template-columns:1fr}
    .servers .srv{display:grid;grid-template-columns:minmax(0,1fr) auto}
    .servers .srv input.nm{grid-column:1/-1;max-width:none}
    .episode-head{grid-template-columns:64px minmax(0,1fr)}
    .episode-head button{grid-column:1/-1}
  }
</style>
</head>
<body>
<header>
  <div class="logo"><div class="dot"></div>HourTV <span style="color:var(--muted);font-weight:400">Admin</span></div>
  <div class="spacer"></div>
  <span class="status" id="status">Sin conectar</span>
  <button class="btn-ghost btn-sm" onclick="openConfig()">⚙ GitHub</button>
  <button class="btn-ghost btn-sm" onclick="loadFromGitHub()">↻ Cargar</button>
  <button class="btn-primary btn-sm" onclick="publish()">⬆ Publicar</button>
</header>

<div class="tabs" id="tabs"></div>
<main>
  <div class="toolbar">
    <input type="search" id="search" placeholder="Buscar…" oninput="render()">
    <button class="btn-primary" onclick="openEditor()">+ Añadir</button>
    <button class="btn-ghost" onclick="exportJson()">Descargar JSON</button>
    <label class="btn-ghost" style="cursor:pointer;padding:9px 16px">Importar JSON<input type="file" accept=".json" onchange="importJson(event)" style="display:none"></label>
  </div>
  <div id="list"></div>
</main>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
// ---------- Estado ----------
const TABS = [
  {id:'movies', label:'Películas', kind:'vod'},
  {id:'series', label:'Series', kind:'series'}
];
let catalog = {version:2, movies:[], series:[]};
let activeTab = 'movies';
let cfg = JSON.parse(localStorage.getItem('hourtv_admin_cfg')||'{}');

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(type||'');setTimeout(()=>t.className='toast',2600)}
function save(){localStorage.setItem('hourtv_admin_catalog',JSON.stringify(catalog))}

// ---------- Tabs ----------
function renderTabs(){
  document.getElementById('tabs').innerHTML = TABS.map(t=>
    `<button class="tab ${t.id===activeTab?'active':''}" onclick="setTab('${t.id}')">${t.label} <span style="color:var(--dim)">${(catalog[t.id]||[]).length}</span></button>`
  ).join('');
}
function setTab(id){activeTab=id;document.getElementById('search').value='';renderTabs();render()}

// ---------- Listado ----------
function render(){
  renderTabs();
  const q=document.getElementById('search').value.toLowerCase().trim();
  const items=(catalog[activeTab]||[]).filter(item=>!q||(item.title||'').toLowerCase().includes(q));
  const list=document.getElementById('list');
  if(!items.length){
    list.className='';
    list.innerHTML=`<div class="empty">Sin contenido VOD. Pulsa “+ Añadir”.</div>`;
    return;
  }
  const isSeries=activeTab==='series';
  list.className='grid';
  list.innerHTML=items.map(item=>{
    const idx=realIndex(item);
    const subtitle=isSeries?`${(item.seasons||[]).length} temp.`:(item.year||'');
    return `<div class="item" onclick="openEditor(${idx})">
      <img class="thumb" src="${esc(item.poster||'')}" onerror="this.style.visibility='hidden'">
      <div class="cap"><b>${esc(item.title)}</b><span>${subtitle}</span></div>
    </div>`;
  }).join('');
}
function realIndex(it){return (catalog[activeTab]||[]).indexOf(it)}

// ---------- Editor ----------
function serverRow(server){
  server=server||{};
  return `<div class="srv">
    <input class="nm" value="${esc(server.name||'')}" placeholder="Nombre del servidor">
    <input class="url" value="${esc(server.url||'')}" placeholder="URL HLS / MP4">
    <button type="button" class="del btn-sm" onclick="this.closest('.srv').remove()">✕</button>
  </div>`;
}
function languageGroupHtml(group){
  const servers=group.servers&&group.servers.length?group.servers:[{name:'Servidor 1',url:''}];
  return `<div class="language-group" data-language-group>
    <div class="language-head">
      <input class="language" value="${esc(group.language||'')}" placeholder="Idioma escrito manualmente, ej. Español">
      <button type="button" class="del btn-sm" onclick="this.closest('.language-group').remove()">Quitar idioma</button>
    </div>
    <div class="servers">${servers.map(serverRow).join('')}</div>
    <button type="button" class="btn-ghost btn-sm" onclick="this.closest('.language-group').querySelector('.servers').insertAdjacentHTML('beforeend',window._serverRow())">+ Añadir servidor</button>
  </div>`;
}
function languageGroups(servers){
  const groups=[];
  (servers&&servers.length?servers:[{name:'Servidor 1',url:'',language:''}]).forEach(server=>{
    const language=(server.language||server.idioma||'').trim();
    let group=groups.find(item=>item.language.toLowerCase()===language.toLowerCase());
    if(!group){group={language,servers:[]};groups.push(group)}
    group.servers.push(server);
  });
  return groups.map(languageGroupHtml).join('');
}
window._serverRow=()=>serverRow({});
window._languageGroup=()=>languageGroupHtml({language:'',servers:[]});
function addLanguageGroup(container){
  const target=typeof container==='string'?document.getElementById(container):container;
  if(target)target.insertAdjacentHTML('beforeend',window._languageGroup());
}
function collectServers(scope){
  const servers=[];
  [...scope.querySelectorAll(':scope > .language-group')].forEach(group=>{
    const language=group.querySelector('.language').value.trim();
    [...group.querySelectorAll('.srv')].forEach(row=>{
      const name=row.querySelector('.nm').value.trim()||'Servidor';
      const url=row.querySelector('.url').value.trim();
      if(url)servers.push({name,url,language});
    });
  });
  return servers;
}
function hasMissingLanguage(scope){
  return [...scope.querySelectorAll(':scope > .language-group')].some(group=>{
    const hasUrl=[...group.querySelectorAll('.url')].some(input=>input.value.trim());
    return hasUrl&&!group.querySelector('.language').value.trim();
  });
}

// Campo de imagen: miniatura de vista previa + URL a mano o subir un archivo
// local (se sube a GitHub y autocompleta la URL). ratio: 'wide' para 16:9.
function imageField(id, label, value, previewId, ratio){
  const fileId = id+'_file';
  const preview = previewId
    ? `<img id="${previewId}" class="thumbprev ${ratio==='wide'?'wide':''}" src="${esc(value)}" onerror="this.style.visibility='hidden'" onload="this.style.visibility='visible'">`
    : '';
  const previewAttr = previewId
    ? ` oninput="document.getElementById('${previewId}').src=this.value"` : '';
  return `<div class="row"><label>${label}</label>
    <div class="imgfield">
      ${preview}
      <input type="text" id="${id}" value="${esc(value)}" placeholder="Pega una URL o sube un archivo"${previewAttr}>
      <label class="upload-btn">Subir…
        <input type="file" accept="image/*" id="${fileId}" style="display:none" onchange="if(this.files[0])uploadImage(this.files[0],'${id}'${previewId?`,'${previewId}'`:''});this.value=''">
      </label>
    </div></div>`;
}

// Categorías/filas predefinidas para el Inicio. El usuario marca las que
// apliquen; determinan en qué filas aparece la película.
const CATEGORIES = ['recomendado','estrenos','populares','antiguas','terror','accion','comedia','romance','aventura','drama','infantil','anime'];
function categoryChips(selected){
  const sel = (selected||[]).map(c=>String(c).toLowerCase());
  return CATEGORIES.map(c=>
    `<div class="chip ${sel.includes(c)?'on':''}" data-cat="${c}" onclick="this.classList.toggle('on')">${c}</div>`
  ).join('');
}
function collectCategories(){
  const on=[...document.querySelectorAll('#f_categories .chip.on')].map(c=>c.dataset.cat);
  return on.length?on:undefined;
}

function openEditor(idx){
  const tab = TABS.find(t=>t.id===activeTab);
  const editing = idx!=null;
  const it = editing ? JSON.parse(JSON.stringify(catalog[activeTab][idx])) : {};
  const body = vodForm(it, tab.kind==='series');
  document.getElementById('modal').innerHTML = `
    <div class="modal-head"><h3>${editing?'Editar':'Nuevo'} · ${tab.label}</h3>
      <button class="btn-ghost btn-sm" onclick="closeModal()">✕</button></div>
    <div class="modal-body" id="mbody">${body}</div>
    <div class="modal-foot">
      ${editing?`<button class="btn-ghost" onclick="removeItem(${idx})" style="color:var(--accent)">Eliminar</button>`:'<span></span>'}
      <div style="display:flex;gap:10px">
        <button class="btn-ghost" onclick="saveItem(${editing?idx:'null'})">Guardar</button>
        <button class="btn-primary" onclick="saveAndPublish(${editing?idx:'null'})">Guardar y publicar</button>
      </div>
    </div>`;
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open')}

function vodForm(it, isSeries){
  return `
  <div class="rowtype">
    <div class="row"><label>Tipo</label>
      <select id="f_content_type" onchange="toggleContentType(this.value)">
        <option value="movie" ${!isSeries?'selected':''}>Película</option>
        <option value="series" ${isSeries?'selected':''}>Serie</option>
      </select>
    </div>
    <div class="row"><label>Título</label><input id="f_title" value="${esc(it.title)}" required></div>
  </div>
  <div class="row"><label>Descripción / sinopsis</label><textarea id="f_plot" maxlength="4000" placeholder="De qué trata…">${esc(it.plot||it.description)}</textarea></div>

  <div class="section-label">Ficha</div>
  <div class="row2">
    <div class="row"><label>Reparto (separado por comas)</label><input id="f_cast" value="${esc(it.cast)}" placeholder="Actor 1, Actor 2…"></div>
    <div class="row"><label>Director</label><input id="f_director" value="${esc(it.director)}"></div>
  </div>
  <div class="row2">
    <div class="row"><label>Escritor / Guionista</label><input id="f_writer" value="${esc(it.writer||it.screenwriter)}"></div>
    <div class="row"><label>Género</label><input id="f_genre" value="${esc(it.genre)}" placeholder="Acción, Terror…"></div>
  </div>
  <div class="row4">
    <div class="row"><label>Fecha de estreno</label><input id="f_release_date" type="date" value="${esc(it.releaseDate||it.release_date)}"></div>
    <div class="row"><label>Año</label><input id="f_year" type="number" min="1888" max="2200" value="${esc(it.year)}"></div>
    <div class="row"><label>Rating (0–10)</label><input id="f_rating" type="number" min="0" max="10" step="0.1" value="${esc(it.rating)}"></div>
    <div class="row"><label>Duración</label><input id="f_duration" value="${esc(it.duration)}" placeholder="120 min"></div>
  </div>

  <div class="section-label">Imágenes</div>
  ${imageField('f_poster', 'Miniatura / carátula (vertical 2:3)', it.poster, 'pv')}
  ${imageField('f_backdrop', 'Imagen de fondo (16:9, opcional)', it.backdrop, 'bpv', 'wide')}

  <div class="section-label">Clasificación</div>
  <div class="row"><label>Categorías / filas del Inicio</label>
    <div class="chips" id="f_categories">${categoryChips(it.categories)}</div>
  </div>
  <div class="row"><label class="check"><input type="checkbox" id="f_featured" ${it.featured?'checked':''}> Destacado (banner grande de Inicio)</label></div>

  <div id="movie_servers" style="${isSeries?'display:none':''}">
    <div class="section-label">Servidores — dónde se ve</div>
    <div class="row"><label>Un grupo por idioma; escribe el idioma y añade uno o más servidores (URL directa .mp4/.m3u8 o enlace embed)</label>
      <div id="f_servers">${languageGroups(it.servers)}</div>
      <button type="button" class="btn-ghost btn-sm" onclick="addLanguageGroup('f_servers')">+ Añadir idioma</button>
    </div>
  </div>
  <div id="series_fields" style="${isSeries?'':'display:none'}">${seasonsBlock(it)}</div>
  `;
}
function toggleContentType(type){
  const isSeries=type==='series';
  document.getElementById('movie_servers').style.display=isSeries?'none':'';
  document.getElementById('series_fields').style.display=isSeries?'':'none';
}

function seasonsBlock(it){
  const seasons = it.seasons||[];
  return `<div class="row"><label>Temporadas y episodios</label>
    <div class="seasons" id="f_seasons">${seasons.map(seasonHtml).join('')}</div>
    <button class="btn-ghost btn-sm" onclick="addSeason()">+ Temporada</button></div>`;
}
function seasonHtml(s){
  return `<div class="season" data-season>
    <div class="sh"><label style="margin:0">Temporada</label><input class="snum" type="number" value="${s.number||1}">
      <div style="flex:1"></div><button class="del btn-sm" onclick="this.closest('.season').remove()">Quitar temporada</button></div>
    <div class="eps">${(s.episodes||[]).map(epHtml).join('')}</div>
    <button class="btn-ghost btn-sm" onclick="this.previousElementSibling.insertAdjacentHTML('beforeend', window._epRow())">+ Episodio</button>
  </div>`;
}
function epHtml(e){
  return `<div class="ep" data-ep>
    <div class="episode-head">
      <input class="nm" type="number" min="1" value="${e.number||1}" title="Número">
      <input class="t" value="${esc(e.title)}" placeholder="Título del episodio">
      <button type="button" class="del btn-sm" onclick="this.closest('.ep').remove()">Quitar</button>
    </div>
    <div class="episode-servers">${languageGroups(e.servers)}</div>
    <button type="button" class="btn-ghost btn-sm" onclick="addLanguageGroup(this.previousElementSibling)">+ Añadir idioma</button>
  </div>`;
}
window._epRow = ()=>epHtml({servers:[]});
function addSeason(){const n=document.querySelectorAll('#f_seasons .season').length+1;document.getElementById('f_seasons').insertAdjacentHTML('beforeend', seasonHtml({number:n,episodes:[{number:1}]}))}

function val(id){const el=document.getElementById(id);return el?el.value.trim():''}
function saveItem(idx){
  const originalTab=activeTab;
  const targetTab=val('f_content_type')==='series'?'series':'movies';
  const releaseDate=val('f_release_date');
  const ratingText=val('f_rating');
  const rating=ratingText===''?undefined:Number(ratingText);
  if(!val('f_title')){toast('El título es obligatorio','err');return}
  if(rating!==undefined&&(Number.isNaN(rating)||rating<0||rating>10)){
    toast('El rating debe estar entre 0 y 10','err');return;
  }
  const current=idx!=null?catalog[originalTab][idx]:null;
  const featured=document.getElementById('f_featured');
  const obj={
    id:(current&&current.id)||uid(),
    title:val('f_title'),
    plot:val('f_plot')||undefined,
    cast:val('f_cast')||undefined,
    director:val('f_director')||undefined,
    writer:val('f_writer')||undefined,
    releaseDate:releaseDate||undefined,
    year:val('f_year')||(releaseDate?releaseDate.slice(0,4):undefined),
    genre:val('f_genre')||undefined,
    rating,
    duration:val('f_duration')||undefined,
    poster:val('f_poster')||undefined,
    backdrop:val('f_backdrop')||undefined,
    categories:collectCategories(),
    featured:featured&&featured.checked?true:undefined
  };

  if(targetTab==='series'){
    let invalid=false;
    obj.seasons=[...document.querySelectorAll('#f_seasons .season')].map(section=>({
      number:parseInt(section.querySelector('.snum').value)||1,
      episodes:[...section.querySelectorAll(':scope > .eps > .ep')].map(episode=>{
        const scope=episode.querySelector('.episode-servers');
        const servers=collectServers(scope);
        if(!servers.length||hasMissingLanguage(scope))invalid=true;
        return {
          number:parseInt(episode.querySelector('.nm').value)||1,
          title:episode.querySelector('.t').value.trim()||undefined,
          servers
        };
      }).filter(episode=>episode.servers.length)
    })).filter(season=>season.episodes.length);
    if(invalid||!obj.seasons.length){
      toast('Cada episodio necesita idioma y al menos un servidor','err');return;
    }
  }else{
    const scope=document.getElementById('f_servers');
    obj.servers=collectServers(scope);
    if(hasMissingLanguage(scope)){
      toast('Escribe el idioma de cada grupo de servidores','err');return;
    }
    if(!obj.servers.length){
      toast('Añade al menos un servidor','err');return;
    }
  }

  if(idx!=null&&targetTab===originalTab){
    catalog[targetTab][idx]=obj;
  }else{
    if(idx!=null)catalog[originalTab].splice(idx,1);
    catalog[targetTab].push(obj);
  }
  activeTab=targetTab;
  save();closeModal();render();
  toast('Guardado localmente. Pulsa “Publicar” para subirlo.','ok');
  return true;
}
// Guarda el elemento y, si se guardó bien, publica todo el catálogo a GitHub.
async function saveAndPublish(idx){
  if(saveItem(idx)===true) await publish();
}
function removeItem(idx){if(!confirm('¿Eliminar este elemento?'))return;catalog[activeTab].splice(idx,1);save();closeModal();render()}

// ---------- Import / export ----------
function exportJson(){
  const blob=new Blob([JSON.stringify(catalog,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='catalog.json';a.click();
}
function importJson(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=()=>{try{catalog=normalize(JSON.parse(r.result));save();render();toast('Importado','ok')}catch(e){toast('JSON inválido','err')}};r.readAsText(f);
}
function normalize(c){
  c=c||{};return {version:2, movies:Array.isArray(c.movies)?c.movies:[], series:Array.isArray(c.series)?c.series:[]};
}

// ---------- GitHub ----------
function openConfig(){
  document.getElementById('modal').innerHTML=`
    <div class="modal-head"><h3>Conexión con GitHub</h3><button class="btn-ghost btn-sm" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <p class="hint">El panel guarda el catálogo directamente en tu repositorio. El token se queda solo en este navegador (localStorage), nunca se envía a otro sitio.</p>
      <div class="row"><label>Usuario / organización</label><input id="c_owner" value="${esc(cfg.owner)}" placeholder="tu-usuario"></div>
      <div class="row"><label>Repositorio</label><input id="c_repo" value="${esc(cfg.repo)}" placeholder="hourtv-catalogo"></div>
      <div class="row2">
        <div class="row"><label>Rama</label><input id="c_branch" value="${esc(cfg.branch||'main')}"></div>
        <div class="row"><label>Ruta del archivo</label><input id="c_path" value="${esc(cfg.path||'catalog.json')}"></div>
      </div>
      <div class="row"><label>Token de acceso (fine-grained, permiso Contents: Read & Write)</label>
        <input id="c_token" type="password" value="${esc(cfg.token)}" placeholder="github_pat_…"></div>
      <p class="hint">Crea el token en <a href="https://github.com/settings/tokens?type=beta" target="_blank">github.com/settings/tokens</a> con acceso solo a ese repositorio.<br>
      URL para pegar en la app (Ajustes → catálogo remoto):<br>
      <b id="rawurl" style="color:var(--ok);word-break:break-all"></b></p>
    </div>
    <div class="modal-foot"><span></span><button class="btn-primary" onclick="saveConfig()">Guardar conexión</button></div>`;
  document.getElementById('overlay').classList.add('open');
  updateRawUrl();
  ['c_owner','c_repo','c_branch','c_path'].forEach(id=>document.getElementById(id).oninput=updateRawUrl);
}
function updateRawUrl(){
  const o=val('c_owner'),r=val('c_repo'),b=val('c_branch')||'main',p=val('c_path')||'catalog.json';
  const el=document.getElementById('rawurl');
  if(el)el.textContent = (o&&r)?`https://raw.githubusercontent.com/${o}/${r}/${b}/${p}`:'(completa usuario y repo)';
}
function saveConfig(){
  cfg={owner:val('c_owner'),repo:val('c_repo'),branch:val('c_branch')||'main',path:val('c_path')||'catalog.json',token:val('c_token')};
  localStorage.setItem('hourtv_admin_cfg',JSON.stringify(cfg));closeModal();refreshStatus();toast('Conexión guardada','ok');
}
function refreshStatus(){
  const s=document.getElementById('status');
  s.innerHTML = cfg.owner&&cfg.repo ? `Repo: <b>${esc(cfg.owner)}/${esc(cfg.repo)}</b>` : 'Sin conectar';
}
async function ghApi(method,extra){
  if(!cfg.token||!cfg.owner||!cfg.repo){toast('Configura GitHub primero','err');openConfig();throw new Error('no cfg')}
  const url=`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${encodeURIComponent(cfg.path).replace(/%2F/g,'/')}`;
  return fetch(url+(method==='GET'?`?ref=${cfg.branch}`:''),{
    method, headers:{Authorization:`Bearer ${cfg.token}`,Accept:'application/vnd.github+json'},
    ...(extra||{})
  });
}
// ---------- Subida de imágenes (archivo local -> GitHub -> URL) ----------
function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>resolve(r.result.split(',')[1]);
    r.onerror=reject;
    r.readAsDataURL(file);
  });
}
async function uploadImage(file, targetInputId, previewId){
  if(!cfg.token||!cfg.owner||!cfg.repo){toast('Configura GitHub primero','err');openConfig();return}
  if(file.size > 8*1024*1024){toast('Imagen muy pesada (máx. 8 MB)','err');return}
  toast('Subiendo imagen…');
  try{
    const ext = (file.name.split('.').pop()||'jpg').toLowerCase().replace(/[^a-z0-9]/g,'')||'jpg';
    const path = `images/${uid()}.${ext}`;
    const content = await fileToBase64(file);
    const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}`;
    const res = await fetch(url,{
      method:'PUT',
      headers:{Authorization:`Bearer ${cfg.token}`,Accept:'application/vnd.github+json'},
      body:JSON.stringify({message:'Subir imagen desde el panel HourTV', content, branch:cfg.branch}),
    });
    if(!res.ok){const e=await res.json().catch(()=>({}));toast('Error al subir: '+(e.message||res.status),'err');return}
    // jsdelivr sirve el repo publico como CDN: mas rapido y sin los limites
    // de hotlinking de raw.githubusercontent.com para muchas imagenes.
    const cdnUrl = `https://cdn.jsdelivr.net/gh/${cfg.owner}/${cfg.repo}@${cfg.branch}/${path}`;
    const input = document.getElementById(targetInputId);
    if(input){input.value=cdnUrl; input.dispatchEvent(new Event('input'))}
    if(previewId){const pv=document.getElementById(previewId); if(pv){pv.src=cdnUrl; pv.style.visibility=''}}
    toast('Imagen subida','ok');
  }catch(e){toast('Fallo al subir la imagen','err')}
}

async function loadFromGitHub(){
  try{
    const res=await ghApi('GET');
    if(res.status===404){toast('El archivo no existe aún — se creará al publicar','warn');return}
    if(!res.ok){toast('Error '+res.status+' al cargar','err');return}
    const data=await res.json();
    const content=decodeURIComponent(escape(atob(data.content.replace(/\n/g,''))));
    catalog=normalize(JSON.parse(content));window._sha=data.sha;save();render();
    toast('Catálogo cargado desde GitHub','ok');
  }catch(e){toast('No se pudo cargar','err')}
}
async function currentSha(){
  try{const g=await ghApi('GET');if(g.ok)return (await g.json()).sha}catch(e){}
  return undefined;
}
function putCatalog(sha){
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(catalog,null,2))));
  return ghApi('PUT',{body:JSON.stringify({
    message:'Actualizar catálogo desde el panel HourTV',
    content, branch:cfg.branch, ...(sha?{sha}:{})
  })});
}
async function publish(){
  if(!cfg.token){toast('Configura GitHub primero','err');openConfig();return}
  try{
    let res=await putCatalog(await currentSha());
    // Si el sha estaba desincronizado, GitHub devuelve el sha correcto en el
    // mensaje (o lo re-pedimos) y reintentamos una vez. Evita el error
    // "catalog.json does not match ...".
    if(res.status===409||res.status===422){
      const e=await res.clone().json().catch(()=>({}));
      const m=/([0-9a-f]{40})/i.exec(e.message||'');
      const fresh=m?m[1]:await currentSha();
      if(fresh)res=await putCatalog(fresh);
    }
    if(res.ok){window._sha=(await res.json()).content.sha;toast('¡Publicado! La app lo verá al recargar.','ok')}
    else{const e=await res.json().catch(()=>({}));toast('Error: '+(e.message||res.status),'err')}
  }catch(e){toast('Fallo al publicar','err')}
}

// ---------- Init ----------
(function(){
  const local=localStorage.getItem('hourtv_admin_catalog');
  if(local){try{catalog=normalize(JSON.parse(local))}catch(e){}}
  refreshStatus();render();
})();
</script>
